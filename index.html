<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Eksperyment – takie same czy różne</title>

  <script src="https://cdn.jsdelivr.net/npm/jspsych@6.3.1/jspsych.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspsych@6.3.1/plugins/jspsych-html-keyboard-response.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/jspsych@6.3.1/css/jspsych.css" rel="stylesheet" />

  <style>
    .jspsych-content {
      max-width: 100% !important;
      width: 100% !important;
    }

    .jspsych-content-wrapper {
      max-width: 100% !important;
    }

    body {
      margin: 0;
      background-color: #f5f5f5;
      font-family: Arial, sans-serif;
    }

    .center {
      text-align: center;
      font-size: 32px;
      margin-top: 40px;
    }

    .video-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-top: 20px;
      margin-bottom: 30px;
    }

    video {
      width: 48vw;
      height: auto;
    }

    .answer-wrap {
      text-align: center;
      margin-top: 20px;
    }

    .big-btn {
      font-size: 60px;
      padding: 30px 80px;
      margin: 20px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #e0e0e0;
    }

    .big-btn:hover {
      background: #d0d0d0;
    }

    .status {
      text-align: center;
      font-size: 28px;
      margin-top: 30px;
      line-height: 1.5;
    }

    .backup-link {
      display: inline-block;
      font-size: 32px;
      margin-top: 20px;
    }
  </style>
</head>

<body></body>

<script>
  const SAVE_URL = "https://script.google.com/macros/s/AKfycbwwCh-A1CNyL442cZLeZrnhrMfczw0x2XgVURyg4O_gGjZ_miReohON2WKjwozRq7qK/exec";

  const timeline = [];

  timeline.push({
    type: 'html-keyboard-response',
    stimulus: `
      <div class="center">
        <p>Zobaczysz dwa filmiki obok siebie.</p>
        <p>Czy są takie same czy różne?</p>
        <p>Naciśnij dowolny klawisz, żeby zacząć.</p>
      </div>
    `
  });

  const pairs = [
    { left: "1a.mp4", right: "1b.mp4", correct: "same" },
    { left: "1a.mp4", right: "1c.mp4", correct: "different" },
    { left: "2a.mp4", right: "2b.mp4", correct: "same" },
    { left: "2a.mp4", right: "2c.mp4", correct: "different" }
  ];

  pairs.forEach(pair => {
    timeline.push({
      type: 'html-keyboard-response',
      choices: jsPsych.NO_KEYS,
      stimulus: `
        <div class="video-container">
          <video controls playsinline>
            <source src="${pair.left}" type="video/mp4">
            Twoja przeglądarka nie obsługuje wideo.
          </video>

          <video controls playsinline>
            <source src="${pair.right}" type="video/mp4">
            Twoja przeglądarka nie obsługuje wideo.
          </video>
        </div>

        <div class="answer-wrap">
          <button id="sameBtn" class="big-btn">Takie same</button>
          <button id="diffBtn" class="big-btn">Różne</button>
        </div>
      `,
      on_load: function() {
        document.getElementById("sameBtn").addEventListener("click", function() {
          jsPsych.finishTrial({
            left: pair.left,
            right: pair.right,
            correct_answer: pair.correct,
            response_label: "same",
            response_text: "Takie same",
            correct: ("same" === pair.correct)
          });
        });

        document.getElementById("diffBtn").addEventListener("click", function() {
          jsPsych.finishTrial({
            left: pair.left,
            right: pair.right,
            correct_answer: pair.correct,
            response_label: "different",
            response_text: "Różne",
            correct: ("different" === pair.correct)
          });
        });
      }
    });
  });

  function buildTSV(trials) {
    let tsv = "left\tright\tresponse_label\tresponse_text\tcorrect\n";
    trials.forEach(t => {
      tsv += [
        t.left || "",
        t.right || "",
        t.response_label || "",
        t.response_text || "",
        (typeof t.correct !== "undefined") ? t.correct : ""
      ].join("\t") + "\n";
    });
    return tsv;
  }

  jsPsych.init({
    timeline: timeline,
    on_finish: function() {
      const trials = jsPsych.data.get()
        .filterCustom(t => t.left && t.right)
        .values();

      const tsv = buildTSV(trials);
      const blob = new Blob([tsv], { type: "text/tab-separated-values" });
      const backupUrl = URL.createObjectURL(blob);

      document.body.innerHTML = `
        <div class="center">
          <h2>Zapisywanie danych...</h2>
        </div>
        <div class="status">
          <p id="saveStatus">Proszę chwilę poczekać.</p>
          <p>
            Backup:
            <a class="backup-link" href="${backupUrl}" download="backup_results.tsv">
              pobierz TSV
            </a>
          </p>
        </div>
      `;

      const payload = {
        participant: "test",
        trials: trials.map(t => ({
          left: t.left,
          right: t.right,
          response: t.response_label,
          response_text: t.response_text,
          correct: t.correct
        }))
      };

      fetch(SAVE_URL, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify(payload)
      })
      .then(response => response.text())
      .then(text => {
        document.getElementById("saveStatus").innerHTML =
          "Dane zapisane online.<br>Możesz też pobrać backup TSV.";
        console.log("Server:", text);
      })
      .catch(error => {
        document.getElementById("saveStatus").innerHTML =
          "Nie udało się zapisać online.<br>Kliknij link powyżej, żeby pobrać TSV.";
        console.error("Save error:", error);
      });
    }
  });
</script>

</html>
