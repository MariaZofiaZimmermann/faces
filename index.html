<script>
    jsPsych.init({
      timeline: timeline,
      on_finish: function() {
        const trials = jsPsych.data.get()
          .filter({ trial_type: "html-button-response" })
          .values();
  
        const payload = {
          participant: "test",
          trials: trials.map(t => ({
            left: t.left,
            right: t.right,
            response: t.response_label,
            correct: t.correct
          }))
        };
  
        // zbuduj TSV od razu
        let tsv = "left\tright\tresponse\tcorrect\n";
        trials.forEach(t => {
          tsv += [
            t.left || "",
            t.right || "",
            t.response_label || "",
            typeof t.correct !== "undefined" ? t.correct : ""
          ].join("\t") + "\n";
        });
  
        const blob = new Blob([tsv], { type: "text/tab-separated-values" });
        const tsvUrl = URL.createObjectURL(blob);
  
        // pokaż ekran końcowy od razu z linkiem backupowym
        document.body.innerHTML = `
          <div class="center" style="margin-top:40px;">
            <h2>Zapisywanie danych...</h2>
            <p>Jeśli dane nie zapiszą się online, kliknij poniżej:</p>
            <p>
              <a id="backupLink" href="${tsvUrl}" download="backup_results.tsv"
                 style="font-size:32px;">
                Pobierz backup TSV
              </a>
            </p>
            <p id="saveStatus" style="font-size:28px;"></p>
          </div>
        `;
  
        fetch(SAVE_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify(payload)
        })
        .then(response => response.text())
        .then(text => {
          console.log("Server response:", text);
          document.getElementById("saveStatus").innerText =
            "Dane wysłane online. Dla bezpieczeństwa możesz też pobrać backup TSV.";
        })
        .catch(err => {
          console.error("Błąd zapisu online:", err);
          document.getElementById("saveStatus").innerText =
            "Nie udało się zapisać online. Kliknij link powyżej, żeby pobrać backup TSV.";
        });
      }
    });
  </script>
