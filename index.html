<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Eksperyment – takie same czy różne</title>

  <!-- jsPsych -->
  <script src="https://cdn.jsdelivr.net/npm/jspsych@6.3.1/jspsych.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspsych@6.3.1/plugins/jspsych-html-button-response.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspsych@6.3.1/plugins/jspsych-html-keyboard-response.js"></script>

  <link href="https://cdn.jsdelivr.net/npm/jspsych@6.3.1/css/jspsych.css" rel="stylesheet" />

  <style>
    /* 🔥 usuwa ograniczenia jsPsych */
    .jspsych-content {
      max-width: 100% !important;
      width: 100% !important;
    }

    .jspsych-content-wrapper {
      max-width: 100% !important;
    }

    body {
      margin: 0;
      background-color: #f5f5f5;
    }

    .video-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-top: 20px;
    }

    video {
      width: 48vw;
      height: auto;
    }

    .jspsych-btn {
      font-size: 60px !important;
      padding: 30px 80px !important;
      margin: 30px !important;
    }

    .center {
      text-align: center;
      font-size: 32px;
      margin-top: 40px;
    }
  </style>
</head>

<body></body>

<script>
  const SAVE_URL = "https://script.google.com/macros/s/AKfycbwwCh-A1CNyL442cZLeZrnhrMfczw0x2XgVURyg4O_gGjZ_miReohON2WKjwozRq7qK/exec";

  let timeline = [];

  /******** INSTRUKCJA ********/
  timeline.push({
    type: 'html-keyboard-response',
    stimulus: `
      <div class="center">
        <p>Zobaczysz dwa filmiki obok siebie.</p>
        <p>Czy są takie same czy różne?</p>
        <p>Naciśnij dowolny klawisz, żeby zacząć.</p>
      </div>
    `
  });

  /******** PARy TESTOWE ********/
  const pairs = [
    { left: "1a.mp4", right: "1b.mp4", correct: "same" },
    { left: "1a.mp4", right: "1c.mp4", correct: "different" },
    { left: "2a.mp4", right: "2b.mp4", correct: "same" },
    { left: "2a.mp4", right: "2c.mp4", correct: "different" }
  ];

  /******** TRIALE ********/
  pairs.forEach(pair => {
    timeline.push({
      type: 'html-button-response',
      stimulus: `
        <div class="video-container">
          <video controls playsinline>
            <source src="${pair.left}" type="video/mp4">
          </video>

          <video controls playsinline>
            <source src="${pair.right}" type="video/mp4">
          </video>
        </div>
      `,
      choices: ['Takie same', 'Różne'],
      data: {
        left: pair.left,
        right: pair.right,
        correct_answer: pair.correct
      },
      on_finish: function(data) {
        data.response_label = data.button_pressed == 0 ? "same" : "different";
        data.correct = (data.response_label === data.correct_answer);
      }
    });
  });

  /******** KONIEC ********/
  timeline.push({
    type: 'html-keyboard-response',
    stimulus: `<div class="center"><h2>Koniec</h2></div>`
  });

  /******** START + ZAPIS ********/
  jsPsych.init({
    timeline: timeline,
    on_finish: function() {

      const trials = jsPsych.data.get()
        .filter({ trial_type: "html-button-response" })
        .values();

      const payload = {
        participant: "test",
        trials: trials.map(t => ({
          left: t.left,
          right: t.right,
          response: t.response_label,
          correct: t.correct
        }))
      };

      fetch(SAVE_URL, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain"
        },
        body: JSON.stringify(payload)
      })
      .then(() => {
        document.body.innerHTML = "<h1 style='text-align:center;margin-top:40px;'>Dziękujemy! KONIEC</h1>";
      })
      .catch(err => {
        console.error(err);
        alert("Błąd zapisu!");
      });
    }
  });
</script>

</html>
